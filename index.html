<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yusuf Bee | Full-Stack Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* VARIABLES */
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    /* RESET & BASE */
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      line-height: 1.6;
    }

    /* LAYOUT */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* HERO SECTION */
    .hero {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 4rem 0;
      text-align: center;
    }
    .hero h1 {
      font-size: 3rem;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.05rem;
      color: #0f172a;
    }
    .hero p.tagline {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .social-links a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .social-links a:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* PROJECTS GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 4rem 0;
    }

    /* PROJECT CARD */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #eee;
      border-bottom: 1px solid var(--border);
      object-position: top;
    }

    .card-content {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      color: #0f172a;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      margin-top: auto;
    }

    .badge {
      background: #eff6ff;
      color: var(--primary);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid #dbeafe;
    }

    .card-actions {
      display: flex;
      gap: 1rem;
      margin-top: auto;
    }

    /* BUTTONS */
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      transition: background 0.2s;
      flex: 1;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    .btn-outline {
      background: white;
      border: 1px solid var(--border);
      color: var(--text-main);
    }
    .btn-outline:hover {
      background: #f1f5f9;
    }

    /* ABOUT SECTION */
    .about-section {
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 4rem 0;
      text-align: center;
    }
    .about-content {
      max-width: 700px;
      margin: 0 auto;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .hero h1 { font-size: 2.2rem; }
      .projects-grid { grid-template-columns: 1fr; }
      .card-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <h1>Yusuf Bee</h1>
      <p class="tagline">Full-Stack Developer | Python & Backend Specialist • Django • AWS • React</p>
